name: Publish website

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type publish to deploy the current master branch"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event.inputs.confirmation == 'publish'
    runs-on: ubuntu-latest
    steps:
      - name: Check out approved source
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Validate publication approvals
        run: python3 scripts/validate_publications.py

      - name: Set up Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.9"
          extended: true

      - name: Build site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --minify --gc --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    if: github.event.inputs.confirmation == 'publish'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
